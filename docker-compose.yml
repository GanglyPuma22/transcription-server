services:
  whisper:
    image: hwdsl2/whisper-server
    restart: unless-stopped
    ports:
      - "${WHISPER_BIND_ADDR:-127.0.0.1}:${WHISPER_HOST_PORT:-9000}:9000/tcp"
    volumes:
      - whisper-model-cache:/var/lib/whisper
      - ./whisper.env:/whisper.env:ro

volumes:
  whisper-model-cache:
    external: true
    name: ${WHISPER_MODEL_CACHE_VOLUME_NAME:-transcription-server-whisper-data}
